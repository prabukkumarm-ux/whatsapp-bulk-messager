<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WaBlast Pro - Professional WhatsApp Bulk Message Sender for Businesses. Send up to 100 messages at once with images, PDFs, and rich media." />
  <title>WaBlast Pro — WhatsApp Bulk Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,20,26,0.98);z-index:9999;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--bg-card);padding:40px;border-radius:24px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);border:1px solid var(--border)">
      <div style="width:70px;height:70px;background:var(--wa-green);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
        <svg width="40" height="40" fill="white" viewBox="0 0 24 24"><path d="M12.89 2.223c-9.733 0-17.626 7.892-17.626 17.626 0 3.02.76 5.86 2.09 8.35l-2.22 8.1 8.28-2.17a17.53 17.53 0 0 0 8.47 2.18c9.73 0 17.63-7.89 17.63-17.626 0-9.734-7.89-17.626-17.63-17.626zm0 32.22c-2.73 0-5.4-.73-7.72-2.12l-.55-.33-4.88 1.28 1.3-4.75-.36-.57a14.54 14.54 0 0 1-2.23-7.73c0-8.03 6.54-14.56 14.57-14.56a14.53 14.53 0 0 1 14.57 14.56c0 8.04-6.54 14.57-14.57 14.57zm7.98-10.89c-.43-.22-2.58-1.27-2.98-1.42-.4-.14-.69-.22-.98.22-.29.43-1.12 1.42-1.37 1.7-.25.29-.51.33-.94.11a11.87 11.87 0 0 1-3.5-2.16c-1.35-1.2-2.26-2.69-2.53-3.14-.26-.44-.03-.68.19-.9.2-.19.43-.51.65-.77.22-.25.29-.43.43-.72.15-.29.07-.54-.04-.76-.11-.22-.98-2.36-1.34-3.23-.35-.87-.71-.75-.98-.76h-.84c-.29 0-.75.11-1.15.54-.4.43-1.51 1.48-1.51 3.61 0 2.13 1.55 4.19 1.77 4.47.22.29 3.05 4.66 7.4 6.54 1.03.45 1.84.72 2.47.92 1.04.33 1.98.28 2.73.17.83-.12 2.58-1.05 2.94-2.07.36-1.01.36-1.88.25-2.06-.1-.19-.4-.3-.83-.52z" transform="scale(0.6) translate(8,8)"/></svg>
      </div>
      <h2 style="margin-bottom:8px">WaBlast Pro</h2>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:30px">Protected Business Dashboard</p>
      
      <div class="form-group" style="text-align:left;margin-bottom:16px">
        <label class="form-label" style="font-size:12px;margin-bottom:6px">Business Email</label>
        <input type="text" id="login-email" class="form-control" autocomplete="email" placeholder="admin@wablast.com" style="height:50px;font-size:15px;pointer-events:auto">
      </div>
      
      <div class="form-group" style="text-align:left;margin-bottom:24px">
        <label class="form-label" style="font-size:12px;margin-bottom:6px">Access Password</label>
        <input type="password" id="login-pass" class="form-control" autocomplete="current-password" placeholder="Enter password" style="height:50px;font-size:15px;pointer-events:auto" autofocus>
      </div>

      <button class="btn btn-primary" id="btn-login" onclick="login()" style="width:100%;height:52px;font-size:16px;font-weight:600;border-radius:12px;pointer-events:auto">Unlock Dashboard</button>
      <div id="login-err" style="color:var(--danger);margin-top:20px;font-size:13px;display:none">Invalid Email or Password</div>
    </div>
  </div>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.08-1.35C8.48 21.52 10.21 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#25d366"/>
          <path d="M17 14.5c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.47-.89-.8-1.49-1.78-1.66-2.08-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.62-.93-2.22-.25-.58-.5-.5-.68-.51-.18 0-.38-.02-.58-.02-.2 0-.52.07-.8.37-.27.3-1.05 1.02-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.12 3.24 5.14 4.54.72.31 1.28.5 1.72.64.72.23 1.38.2 1.9.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z" fill="white"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">WaBlast</span>
        <span class="logo-pro">PRO</span>
      </div>
    </div>

    <!-- WhatsApp Status Badge -->
    <div class="wa-status-badge" id="wa-status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity=".8"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity=".6"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="connect" id="nav-connect">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor"/></svg>
        <span>Connect WhatsApp</span>
        <div class="nav-badge" id="connect-badge" style="display:none">!</div>
      </a>
      <a href="#" class="nav-item" data-page="campaigns" id="nav-campaigns">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Campaigns</span>
      </a>
      <a href="#" class="nav-item" data-page="compose" id="nav-compose">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span>New Campaign</span>
      </a>
      <a href="#" class="nav-item" data-page="contacts" id="nav-contacts">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Contacts</span>
      </a>
      <a href="#" class="nav-item" data-page="templates" id="nav-templates">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="2"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Templates</span>
      </a>
      <div style="border-top:1px solid var(--border);margin:10px 0"></div>
      <a href="#" class="nav-item" onclick="logout()" style="color:var(--accent-red)">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M17 16l4-4-4-4M21 12H9M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Logout Session</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="connected-info" id="connected-info" style="display:none">
        <div class="ci-avatar">📱</div>
        <div class="ci-details">
          <span class="ci-name" id="ci-name">Connected</span>
          <span class="ci-phone" id="ci-phone"></span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="wa-connection-chip" id="wa-chip">
          <div class="chip-dot" id="chip-dot"></div>
          <span id="chip-text">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- Pages -->
    <div class="page active" id="page-dashboard">
      <!-- Dashboard content injected by JS -->
    </div>

    <div class="page" id="page-connect">
      <!-- Connect page content -->
    </div>

    <div class="page" id="page-campaigns">
      <!-- Campaigns page -->
    </div>

    <div class="page" id="page-compose">
      <!-- Compose campaign page -->
    </div>

    <div class="page" id="page-contacts">
      <!-- Contacts page -->
    </div>

    <div class="page" id="page-templates">
      <!-- Templates page -->
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="app2.js"></script>
  <script src="app3.js"></script>
</body>
</html>
